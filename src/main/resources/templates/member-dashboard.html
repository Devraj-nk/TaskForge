<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="stylesheet" th:href="@{/app.css}"/>
    <title>My Dashboard</title>
</head>
<body>
<div th:replace="~{fragments :: header('Team Member Dashboard')}"/>

<main class="tf-page">
    <section class="tf-main">

<div th:if="${member == null}">
    <p>Member not found.</p>
</div>

<div th:if="${member != null}">
    <p>
        <strong>Name:</strong> <span th:text="${member.name}"></span>
        <br/>
        <strong>Email:</strong> <span th:text="${member.email}"></span>
    </p>

    <h3>Current Project</h3>
    <div th:if="${project == null}">No project assigned yet.</div>
    <div th:if="${project != null}">
        <p>
            <strong>Project:</strong> <span th:text="${project.name}"></span>
            <span>(id </span><span th:text="${project.projectId}"></span><span>)</span>
        </p>
    </div>

    <h3>Current Sprint</h3>
    <div th:if="${currentSprint == null}">No sprint created yet.</div>
    <div th:if="${currentSprint != null}">
        <p>
            <strong>Sprint:</strong> <span th:text="${currentSprint.sprintId}"></span>
            <span th:if="${currentSprint.startDate}"> — start: </span><span th:text="${currentSprint.startDate}"></span>
            <span th:if="${currentSprint.endDate}"> — end: </span><span th:text="${currentSprint.endDate}"></span>
            <span> — </span>
            <a th:href="@{'/member/sprints/' + ${currentSprint.sprintId}}">open</a>
        </p>
    </div>

    <h3>My Tasks</h3>
    <div th:if="${#lists.isEmpty(myTasks)}">No tasks assigned to you.</div>
    <table th:if="${!#lists.isEmpty(myTasks)}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Status</th>
            <th>Priority</th>
            <th>Blocked By</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="t : ${myTasks}">
            <td th:text="${t.taskId}"></td>
            <td th:text="${t.title}"></td>
            <td th:text="${t.status}"></td>
            <td th:text="${t.priority}"></td>
            <td>
                <span th:if="${#lists.isEmpty(blockersByTaskId[t.taskId])}">-</span>
                <ul th:if="${!#lists.isEmpty(blockersByTaskId[t.taskId])}">
                    <li th:each="b : ${blockersByTaskId[t.taskId]}" th:text="${b}"></li>
                </ul>
            </td>
            <td>
                <form th:action="@{'/member/tasks/' + ${t.taskId} + '/status'}" method="post" style="display:inline;">
                    <input type="hidden" name="status" value="IN_PROGRESS"/>
                    <button type="submit" th:disabled="${!#lists.isEmpty(blockersByTaskId[t.taskId])}">Start</button>
                </form>
                <span> </span>
                <form th:action="@{'/member/tasks/' + ${t.taskId} + '/status'}" method="post" style="display:inline;">
                    <input type="hidden" name="status" value="COMPLETED"/>
                    <button type="submit">Complete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

    </section>
</main>

</body>
</html>
