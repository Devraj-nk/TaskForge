<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Tasks</title>
</head>
<body>
<div th:replace="~{fragments :: header('Tasks')}"/>

<div th:if="${#lists.isEmpty(tasks)}">No tasks yet. Create one from a project.</div>

<table th:if="${!#lists.isEmpty(tasks)}" border="1" cellpadding="6" cellspacing="0">
    <thead>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Status</th>
        <th>Priority</th>
        <th>Assigned To</th>
        <th>Open</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="t : ${tasks}">
        <td th:text="${t.taskId}"></td>
        <td th:text="${t.title}"></td>
        <td th:text="${t.status}"></td>
        <td th:text="${t.priority}"></td>
        <td>
            <span th:if="${t.assignedTo == null}">-</span>
            <span th:if="${t.assignedTo != null}">
                <span th:text="${t.assignedTo.name}"></span>
                <span>(id </span><span th:text="${t.assignedTo.userId}"></span><span>)</span>
            </span>
        </td>
        <td><a th:href="@{'/tasks/' + ${t.taskId}}">view</a></td>
    </tr>
    </tbody>
</table>

</body>
</html>
