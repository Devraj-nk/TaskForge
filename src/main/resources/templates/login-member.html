<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="stylesheet" href="/app.css" th:href="@{/app.css}"/>
    <title>Member Login</title>
</head>
<body>
<div th:replace="~{fragments :: header('Member Login')}"/>

<main class="tf-page">
    <section class="tf-main">
        <div class="tf-center">
            <section class="tf-card">
                <section class="tf-section">
                    <h2>Team Member sign in</h2>
                    <p class="tf-muted">Team Members only. Managers should use Manager Login.</p>

                    <form method="post" th:action="@{/login/member}">
                        <label>
                            Email
                            <input name="email" type="email" autocomplete="username" placeholder="you@example.com" required/>
                        </label>
                        <label>
                            Password
                            <input name="password" type="password" autocomplete="current-password" required/>
                        </label>

                        <div class="tf-form-actions">
                            <button type="submit">Login</button>
                            <a class="tf-pill" href="/register/member">Don’t have an account?</a>
                            <a class="tf-pill" href="/login/manager">Manager login</a>
                        </div>
                    </form>
                </section>
            </section>
        </div>
    </section>
</main>

</body>
</html>
