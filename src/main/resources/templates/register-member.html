<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="stylesheet" href="/app.css" th:href="@{/app.css}"/>
    <title>Member Register</title>
</head>
<body>
<div th:replace="~{fragments :: header('Member Register')}"/>

<main class="tf-page">
    <section class="tf-main">
        <div class="tf-center">
            <section class="tf-card">
                <section class="tf-section">
                    <h2>Create a Team Member account</h2>
                    <p class="tf-muted">Creates a TEAM_MEMBER user (plain password).</p>

                    <form method="post" th:action="@{/register/member}">
                        <label>
                            Name
                            <input name="name" type="text" autocomplete="name" placeholder="Your name" required/>
                        </label>
                        <label>
                            Email
                            <input name="email" type="email" autocomplete="email" placeholder="you@example.com" required/>
                        </label>
                        <label>
                            Password
                            <input name="password" type="password" autocomplete="new-password" placeholder="Choose a password" required/>
                        </label>

                        <div class="tf-form-actions">
                            <button type="submit">Create account</button>
                            <a class="tf-pill" href="/login/member">Already have an account?</a>
                            <a class="tf-pill" href="/register/manager">Register as Manager</a>
                        </div>
                    </form>
                </section>
            </section>
        </div>
    </section>
</main>

</body>
</html>
