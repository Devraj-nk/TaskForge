<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="stylesheet" href="/app.css" th:href="@{/app.css}"/>
    <title>Members</title>
</head>
<body>
<div th:replace="~{fragments :: header('Members')}"/>

<main class="tf-page">
    <section class="tf-main">

        <section class="tf-section">
            <h2>All Team Members</h2>
            <p class="tf-muted">View all registered team members and their current team/project assignment.</p>
        </section>

        <div class="tf-empty" th:if="${#lists.isEmpty(members)}">No team members found.</div>

        <table th:if="${!#lists.isEmpty(members)}">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Team</th>
                <th>Project</th>
                <th>Manage</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="m : ${members}">
                <td th:text="${m.userId}"></td>
                <td th:text="${m.name}"></td>
                <td th:text="${m.email}"></td>
                <td>
                    <span th:if="${m.team == null}">-</span>
                    <span th:if="${m.team != null}">
                        <span th:text="${m.team.teamName}"></span>
                        <span class="tf-muted">(id </span><span class="tf-muted" th:text="${m.team.teamId}"></span><span class="tf-muted">)</span>
                    </span>
                </td>
                <td>
                    <span th:if="${m.team == null || m.team.project == null}">-</span>
                    <span th:if="${m.team != null && m.team.project != null}">
                        <a th:href="@{'/projects/' + ${m.team.project.projectId}}" th:text="${m.team.project.name}"></a>
                        <span class="tf-muted">(id </span><span class="tf-muted" th:text="${m.team.project.projectId}"></span><span class="tf-muted">)</span>
                    </span>
                </td>
                <td>
                    <form class="tf-inline" th:action="@{'/members/' + ${m.userId} + '/project'}" method="post">
                        <div class="tf-actions">
                            <select name="projectId">
                                <option value="" th:selected="${m.team == null || m.team.project == null}">No project/team</option>
                                <option th:each="p : ${projects}"
                                        th:value="${p.projectId}"
                                        th:selected="${m.team != null && m.team.project != null && m.team.project.projectId == p.projectId}"
                                        th:text="${p.name + ' (id ' + p.projectId + ')'}">
                                </option>
                            </select>
                            <button type="submit">Save</button>
                        </div>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

    </section>
</main>

</body>
</html>
