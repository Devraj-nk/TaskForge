spring.application.name=task-management-system

# Optional local-only secrets (not committed)
# Create `taskforge-secrets.properties` at the repo root to override credentials locally.
spring.config.import=optional:file:./taskforge-secrets.properties

# --- MySQL (local dev) ---
# If the DB doesn't exist yet, MySQL will auto-create it (requires privileges).
spring.datasource.url=jdbc:mysql://localhost:3306/taskforge?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${TASKFORGE_DB_USER:root}
spring.datasource.password=${TASKFORGE_DB_PASS:}

# Use SQL DDL scripts for schema creation; JPA validates mappings
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=true

# Optional visibility during development
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
